name: CI (draft)

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  filter:
    name: changed paths filter
    runs-on: ubuntu-latest
    outputs:
      contracts_changed: ${{ steps.filter.outputs.contracts }}
      sdks_changed: ${{ steps.filter.outputs.sdks }}
      clis_changed: ${{ steps.filter.outputs.clis }}
      frontends_changed: ${{ steps.filter.outputs.frontends }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            contracts:
              - 'contracts/**'
            sdks:
              - 'sdks/**'
            clis:
              - 'clis/**'
            frontends:
              - 'frontends/**'
            docs:
              - 'documentation/**'
              - 'specifications/**'
              - 'README.md'
              - 'SETUP.md'

  devsecops:
    name: DevSecOps scans
    runs-on: ubuntu-latest
    needs: filter
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scanning (detect-secrets)
        run: |
          python3 -m pip install detect-secrets
          detect-secrets scan > .secrets.baseline
          detect-secrets audit .secrets.baseline || true

      - name: Run npm audit for sdks
        run: |
          if [ -f sdks/typescript/package.json ]; then
            cd sdks/typescript
            npm ci
            npm audit --audit-level=moderate || true
            cd -
          fi

      - name: Run npm audit for clis
        run: |
          if [ -f clis/package.json ]; then
            cd clis
            npm ci
            npm audit --audit-level=moderate || true
            cd -
          fi

      # slither removed per request; consider adding Docker-based Slither or CodeQL in future

  contracts:
    name: Contracts - Foundry tests
    runs-on: ubuntu-latest
    needs: [filter, devsecops]
    if: needs.filter.outputs.contracts_changed == 'true' && needs.filter.outputs.docs_only != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          source ~/.bashrc || true
          foundryup || true

      - name: Run forge tests
        run: |
          cd contracts
          forge test -v

  sdks:
    name: SDKs - build & tests
    runs-on: ubuntu-latest
    needs: [filter, contracts, devsecops]
    if: |
      needs.filter.outputs.sdks_changed == 'true' || needs.filter.outputs.contracts_changed == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and test
        run: |
          cd sdks/typescript
          npm ci
          npm test

  clis:
    name: CLIs - build & tests
    runs-on: ubuntu-latest
    needs: [filter, sdks, contracts, devsecops]
    if: |
      needs.filter.outputs.clis_changed == 'true' || needs.filter.outputs.sdks_changed == 'true' || needs.filter.outputs.contracts_changed == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and test
        run: |
          cd clis
          npm ci
          npm test

  frontends:
    name: Frontends - build & tests
    runs-on: ubuntu-latest
    needs: [filter, sdks, contracts, devsecops]
    if: |
      needs.filter.outputs.frontends_changed == 'true' || needs.filter.outputs.sdks_changed == 'true' || needs.filter.outputs.contracts_changed == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and test (frontend placeholder)
        run: |
          if [ -f frontends/package.json ]; then
            cd frontends
            npm ci
            npm test || true
          else
            echo "No frontends detected"
          fi
